<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahrádka</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div>
        <p class="eyebrow">Moje zahrádka</p>
        <h1>Zahradní království</h1>
      </div>
      <div class="money-panel">
        <span>💰</span>
        <strong id="money">0</strong>
        <span>korun</span>
      </div>
    </header>

    <main class="game-layout">
      <aside class="sidebar">
        <section class="panel">
          <h2>Semínka</h2>
          <div id="seedButtons" class="seed-buttons"></div>
        </section>

        <section class="panel hint-panel">
          <h3>Jak hrát</h3>
          <p>Vyber semínko a klikni na políčko.</p>
          <p>Hotové květiny můžeš utrhnout za peníze.</p>
        </section>
      </aside>

      <section class="garden-panel">
        <div id="garden" class="garden"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
